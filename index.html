<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shared Memories</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Shared Memories</p>
        <h1>二人の思い出アプリ</h1>
        <p class="subtext">やりたいこと、やったこと、その日の記録を1つの場所にまとめる。</p>
      </div>
      <div class="topbar-actions">
        <button id="driveConnectBtn" class="ghost-btn">Google Drive連携</button>
        <button id="driveSyncBtn" class="primary-btn">Driveに保存</button>
      </div>
    </header>

    <main class="layout-grid">
      <section class="panel stack">
        <div class="panel-header">
          <h2>やりたいことリスト</h2>
          <span id="wishCount" class="badge">0</span>
        </div>
        <form id="wishForm" class="inline-form">
          <input id="wishInput" type="text" placeholder="例：温泉旅行に行く" maxlength="120" />
          <button class="primary-btn" type="submit">追加</button>
        </form>
        <div id="wishList" class="list-stack"></div>
      </section>

      <section class="panel stack">
        <div class="panel-header">
          <h2>やったことリスト</h2>
          <span id="doneCount" class="badge">0</span>
        </div>
        <form id="doneForm" class="inline-form">
          <input id="doneInput" type="text" placeholder="例：記念日ディナーに行った" maxlength="120" />
          <button class="primary-btn" type="submit">追加</button>
        </form>
        <div id="doneList" class="list-stack"></div>
      </section>

      <section class="panel stack calendar-panel">
        <div class="panel-header">
          <div>
            <h2>カレンダー</h2>
            <p id="monthLabel" class="subtext"></p>
          </div>
          <div class="calendar-nav">
            <button id="prevMonthBtn" class="ghost-btn" type="button">‹</button>
            <button id="nextMonthBtn" class="ghost-btn" type="button">›</button>
          </div>
        </div>
        <div class="calendar-weekdays" id="weekdayRow"></div>
        <div id="calendarGrid" class="calendar-grid"></div>
      </section>

      <section class="panel stack detail-panel">
        <div class="panel-header">
          <div>
            <h2 id="detailDateLabel">日付を選択</h2>
            <p class="subtext">その日に何をしたかを記録できます。</p>
          </div>
          <span id="dayStatusBadge" class="badge muted">未記録</span>
        </div>

        <form id="dayEntryForm" class="stack">
          <label class="field-label" for="dayTitleInput">タイトル</label>
          <input id="dayTitleInput" type="text" maxlength="100" placeholder="例：桜を見に行った" />

          <label class="field-label" for="dayNoteInput">メモ</label>
          <textarea id="dayNoteInput" rows="4" maxlength="400" placeholder="この日にしたことや感想"></textarea>

          <label class="field-label" for="dayDoneItemsInput">その日にやったこと</label>
          <input id="dayDoneItemsInput" type="text" maxlength="180" placeholder="例：ランチ、映画、散歩" />

          <label class="field-label" for="photoInput">写真1枚</label>
          <input id="photoInput" type="file" accept="image/*" />
          <div class="photo-preview-wrap">
            <img id="photoPreview" class="photo-preview hidden" alt="その日の写真" />
            <div id="photoEmpty" class="photo-empty">写真はまだありません</div>
          </div>

          <div class="form-actions">
            <button id="saveDayEntryBtn" class="primary-btn" type="submit">この日の記録を保存</button>
            <button id="clearDayEntryBtn" class="ghost-btn" type="button">入力を消す</button>
          </div>
        </form>
      </section>
    </main>
  </div>

  <script src="./js/app.js"></script>
</body>
</html>
