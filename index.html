<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shared Memories</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-title-spacer"></div>
      <div class="topbar-actions">
        <button id="driveConnectBtn" class="ghost-btn" type="button">Google Drive連携</button>
      </div>
    </header>

    <div class="tab-bar">
      <button id="doneTabBtn" class="tab-btn active" type="button" data-tab="done">やったことリスト</button>
      <button id="wishTabBtn" class="tab-btn" type="button" data-tab="wish">やりたいことリスト</button>
    </div>

    <main>
      <section id="doneTab" class="tab-panel active">
        <div class="done-layout">
          <section class="panel calendar-panel">
            <div class="panel-header panel-header-tight">
              <div>
                <h2>Calendar</h2>
                <p id="monthLabel" class="subtext"></p>
              </div>
              <div class="calendar-nav">
                <button id="prevMonthBtn" class="ghost-btn icon-btn" type="button" aria-label="前の月">‹</button>
                <button id="nextMonthBtn" class="ghost-btn icon-btn" type="button" aria-label="次の月">›</button>
              </div>
            </div>

            <div class="calendar-weekdays" id="weekdayRow"></div>
            <div id="calendarGrid" class="calendar-grid"></div>
          </section>

          <section class="panel day-form-panel">
            <div class="panel-header panel-header-column">
              <div>
                <h2 id="detailDateLabel">日付を選択</h2>
                <p class="subtext">タイトル・メモ・写真1枚を記録できます。</p>
              </div>
            </div>

            <form id="dayEntryForm" class="stack">
              <label class="field-label" for="dayTitleInput">タイトル</label>
              <input id="dayTitleInput" type="text" maxlength="100" placeholder="例：夜景を見に行った" />

              <label class="field-label" for="dayNoteInput">メモ</label>
              <textarea id="dayNoteInput" rows="5" maxlength="500" placeholder="その日のことを自由に記録"></textarea>

              <label class="field-label" for="photoInput">写真</label>
              <input id="photoInput" type="file" accept="image/*" />
              <div id="photoPreviewGrid" class="photo-grid single-photo-grid"></div>
              <div id="photoEmpty" class="photo-empty">写真はまだありません</div>
              <p class="hint-text">iPhoneの写真は自動でJPEG圧縮して保存します。</p>

              <div class="form-actions">
                <button id="saveDayEntryBtn" class="primary-btn" type="submit">保存</button>
                <button id="clearDayEntryBtn" class="ghost-btn" type="button">入力をクリア</button>
              </div>
            </form>
          </section>
        </div>

        <section class="panel done-history-panel">
          <div class="panel-header">
            <div>
              <h2>やったこと</h2>
              <p class="subtext">記録した内容が新しい順に並びます。</p>
            </div>
            <span id="doneCount" class="badge">0</span>
          </div>
          <div id="doneList" class="card-list"></div>
        </section>
      </section>

      <section id="wishTab" class="tab-panel">
        <section class="panel wish-panel">
          <div class="panel-header">
            <div>
              <h2>やりたいことリスト</h2>
              <p class="subtext">追加日とコメントも一緒に残せます。</p>
            </div>
            <span id="wishCount" class="badge">0</span>
          </div>

          <form id="wishForm" class="stack wish-form">
            <label class="field-label" for="wishInput">やりたいこと</label>
            <input id="wishInput" type="text" maxlength="120" placeholder="例：海の見えるホテルに泊まる" />

            <label class="field-label" for="wishDateInput">日付</label>
            <input id="wishDateInput" type="date" />

            <label class="field-label" for="wishCommentInput">コメント</label>
            <textarea id="wishCommentInput" rows="4" maxlength="300" placeholder="行きたい理由やメモ"></textarea>

            <div class="form-actions">
              <button class="primary-btn" type="submit">追加</button>
            </div>
          </form>

          <div id="wishList" class="card-list"></div>
        </section>
      </section>
    </main>
  </div>

  <dialog id="dayModal" class="day-modal">
    <div class="day-modal-card">
      <div class="panel-header modal-header">
        <div>
          <h2 id="modalDateLabel">日付詳細</h2>
          <p id="modalSubtitle" class="subtext"></p>
        </div>
        <button id="closeModalBtn" class="ghost-btn icon-btn" type="button" aria-label="閉じる">×</button>
      </div>

      <div class="modal-section">
        <div id="modalTitle" class="modal-title"></div>
        <div id="modalNote" class="modal-note"></div>
      </div>

      <div id="modalPhotoGrid" class="photo-grid modal-photo-grid"></div>
    </div>
  </dialog>

  <script src="./js/app.js"></script>
</body>
</html>
